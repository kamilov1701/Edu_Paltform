<!DOCTYPE html>

<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Settings - The Academic Atelier</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-surface": "#191c1d",
            "on-secondary-fixed-variant": "#005321",
            "primary-fixed-dim": "#c3c0ff",
            "tertiary-fixed-dim": "#ffb695",
            "inverse-surface": "#2e3132",
            "on-secondary-fixed": "#002109",
            "primary-fixed": "#e2dfff",
            "on-error": "#ffffff",
            "surface-container": "#edeeef",
            "on-primary-fixed": "#0f0069",
            "error-container": "#ffdad6",
            "secondary-fixed": "#6bff8f",
            "on-tertiary-container": "#ffd2be",
            "tertiary-fixed": "#ffdbcc",
            "on-tertiary": "#ffffff",
            "surface-bright": "#f8f9fa",
            "on-tertiary-fixed": "#351000",
            "on-tertiary-fixed-variant": "#7b2f00",
            "error": "#ba1a1a",
            "outline-variant": "#c7c4d8",
            "primary": "#3525cd",
            "surface-tint": "#4d44e3",
            "on-primary": "#ffffff",
            "on-primary-container": "#dad7ff",
            "surface-container-lowest": "#ffffff",
            "surface-container-highest": "#e1e3e4",
            "surface-container-high": "#e7e8e9",
            "surface-dim": "#d9dadb",
            "tertiary": "#7e3000",
            "inverse-primary": "#c3c0ff",
            "on-primary-fixed-variant": "#3323cc",
            "on-background": "#191c1d",
            "inverse-on-surface": "#f0f1f2",
            "primary-container": "#4f46e5",
            "on-error-container": "#93000a",
            "surface": "#f8f9fa",
            "background": "#f8f9fa",
            "surface-container-low": "#f3f4f5",
            "secondary-fixed-dim": "#4ae176",
            "secondary-container": "#6bff8f",
            "outline": "#777587",
            "surface-variant": "#e1e3e4",
            "secondary": "#006e2f",
            "on-secondary": "#ffffff",
            "on-surface-variant": "#464555",
            "tertiary-container": "#a44100",
            "on-secondary-container": "#007432"
          },
          fontFamily: {
            "headline": ["Inter"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .tonal-shift {
      background: linear-gradient(to bottom, transparent, var(--surface-container-low));
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="bg-surface font-body text-on-surface antialiased min-h-screen pb-24">
  <!-- TopAppBar -->
  <header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm dark:shadow-none">
    <div class="flex items-center justify-between px-4 h-16 w-full">
      <div class="flex items-center gap-3">
        <a href="./Profile.html">
          <button
            class="p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors rounded-full active:scale-95 duration-200">
            <span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
          </button>
        </a>
        <h1 class="font-inter font-bold tracking-tight text-slate-900 dark:text-slate-100 text-lg">Settings</h1>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-lg font-bold tracking-tighter text-indigo-600 dark:text-indigo-400">The Academic
          Atelier</span>
      </div>
    </div>
    <div class="bg-slate-100/50 dark:bg-slate-800/50 h-[1px]"></div>
  </header>
  <main class="pt-24 px-6 max-w-2xl mx-auto space-y-8">
    <!-- Profile Overview Section -->
    <section class="relative group">
      <div
        class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_4px_24px_rgba(0,0,0,0.04)] flex flex-col items-center text-center space-y-4">
        <div class="relative">
          <div
          class="w-32 h-32 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border-4 border-surface-container-lowest shadow-sm">
          <span class="material-symbols-outlined text-6xl text-outline"
            style="font-variation-settings: 'FILL' 1;">person</span>
        </div>
          <button
            class="absolute bottom-0 right-0 bg-primary p-2 rounded-full text-white shadow-lg active:scale-90 transition-transform">
            <span class="material-symbols-outlined text-sm" data-icon="edit"
              style="font-variation-settings: 'FILL' 1;">edit</span>
          </button>
        </div>
        <div>
          <h2 class="text-2xl font-bold tracking-tight text-on-surface">Azizbek Thorne</h2>
          <p class="text-outline font-medium">Student</p>
        </div>
        <div
          class="inline-flex items-center px-4 py-1.5 bg-secondary-container/30 text-on-secondary-container rounded-full text-xs font-bold uppercase tracking-widest">
          <span class="material-symbols-outlined text-sm mr-2" data-icon="verified"
            style="font-variation-settings: 'FILL' 1;">verified</span>
          Premium Scholar
        </div>
      </div>
    </section>
    <!-- Settings List -->
    <section class="space-y-4">
      <h3 class="text-xs font-bold text-outline uppercase tracking-widest px-2">Account Security</h3>
      <div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-[0_4px_24px_rgba(0,0,0,0.02)]">
        <!-- Edit Profile -->
        <button
          class="w-full flex items-center justify-between p-5 hover:bg-surface-container-low transition-colors group">
          <div class="flex items-center gap-4">
            <div
              class="w-10 h-10 flex items-center justify-center rounded-xl bg-primary/5 text-primary group-hover:scale-110 transition-transform">
              <span class="material-symbols-outlined" data-icon="person">person</span>
            </div>
            <div class="text-left">
              <span class="block text-on-surface font-semibold">Edit profile</span>
              <span class="block text-outline text-xs">Name, Bio, Profile Image</span>
            </div>
          </div>
          <span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform"
            data-icon="chevron_right">chevron_right</span>
        </button>
        <!-- Change Password -->
        <button
          class="w-full flex items-center justify-between p-5 hover:bg-surface-container-low transition-colors group border-t border-surface-container/50">
          <div class="flex items-center gap-4">
            <div
              class="w-10 h-10 flex items-center justify-center rounded-xl bg-primary/5 text-primary group-hover:scale-110 transition-transform">
              <span class="material-symbols-outlined" data-icon="lock">lock</span>
            </div>
            <div class="text-left">
              <span class="block text-on-surface font-semibold">Change password</span>
              <span class="block text-outline text-xs">Last changed 3 months ago</span>
            </div>
          </div>
          <span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform"
            data-icon="chevron_right">chevron_right</span>
        </button>
      </div>
    </section>
    <section class="space-y-4">
      <h3 class="text-xs font-bold text-outline uppercase tracking-widest px-2">Preferences</h3>
      <div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-[0_4px_24px_rgba(0,0,0,0.02)]">
        <!-- Notifications -->
        <button
          class="w-full flex items-center justify-between p-5 hover:bg-surface-container-low transition-colors group">
          <div class="flex items-center gap-4">
            <div
              class="w-10 h-10 flex items-center justify-center rounded-xl bg-secondary/5 text-secondary group-hover:scale-110 transition-transform">
              <span class="material-symbols-outlined" data-icon="notifications"
                style="font-variation-settings: 'FILL' 1;">notifications</span>
            </div>
            <div class="text-left">
              <span class="block text-on-surface font-semibold">Notifications</span>
              <span class="block text-outline text-xs">Manage study reminders</span>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs font-medium text-secondary bg-secondary/10 px-2 py-0.5 rounded-full">On</span>
            <span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform"
              data-icon="chevron_right">chevron_right</span>
          </div>
        </button>
      </div>
    </section>
    <!-- Danger Zone -->
    <section class="pt-4">
      <a href="./login.html">
        <button
          class="w-full flex items-center justify-center gap-3 p-5 rounded-xl border-2 border-error/10 text-error font-bold hover:bg-error/5 transition-colors active:scale-95 duration-150">
          <span class="material-symbols-outlined" data-icon="logout">logout</span>
          Logout
        </button>
      </a>
      <p class="text-center text-outline text-[10px] mt-6 uppercase tracking-widest font-medium">Version 1.7.1 • The
        MAX - V © 2026</p>
    </section>
  </main>
  <!-- BottomNavBar -->
  <nav
    class="fixed bottom-0 w-full rounded-t-3xl bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-[0_-4px_20px_0_rgba(0,0,0,0.05)] z-50">
    <div class="flex justify-around items-center w-full px-2 py-3 pb-safe">
      <button
        class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1 hover:text-indigo-500 transition-all active:scale-90 duration-150">
        <span class="material-symbols-outlined" data-icon="home">home</span>
        <span class="font-inter text-[10px] font-medium uppercase tracking-wider mt-1">Home</span>
      </button>
      <button
        class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1 hover:text-indigo-500 transition-all active:scale-90 duration-150">
        <span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
        <span class="font-inter text-[10px] font-medium uppercase tracking-wider mt-1">Subjects</span>
      </button>
      <button
        class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1 hover:text-indigo-500 transition-all active:scale-90 duration-150">
        <span class="material-symbols-outlined" data-icon="play_circle">play_circle</span>
        <span class="font-inter text-[10px] font-medium uppercase tracking-wider mt-1">Lessons</span>
      </button>
      <button
        class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-3 py-1 hover:text-indigo-500 transition-all active:scale-90 duration-150">
        <span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
        <span class="font-inter text-[10px] font-medium uppercase tracking-wider mt-1">Chat</span>
      </button>
      <button
        class="flex flex-col items-center justify-center text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 rounded-2xl px-3 py-1 active:scale-90 duration-150">
        <span class="material-symbols-outlined" data-icon="person"
          style="font-variation-settings: 'FILL' 1;">person</span>
        <span class="font-inter text-[10px] font-medium uppercase tracking-wider mt-1">Profile</span>
      </button>
    </div>
  </nav>
</body>

</html>
